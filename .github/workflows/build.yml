              <path android:fillColor="#000000"
                  android:pathData="M44,47 C44,44.5 45.5,43 47.5,43 C49.5,43 51,44.5 51,47 C51,49.5 49.5,51 47.5,51 C45.5,51 44,49.5 44,47Z"/>
              <path android:fillColor="#000000"
