          import org.strongswan.android.logic.ProfileCrypto;
          import org.strongswan.android.logic.ProfileManager;
          import org.strongswan.android.logic.VpnStateService;
          import org.strongswan.android.logic.VpnStateService.State;

          import java.text.SimpleDateFormat;
          import java.util.ArrayList;
          import java.util.Date;
          import java.util.List;
          import java.util.Locale;

          public class AsadMainActivity extends Activity implements VpnStateService.VpnStateListener {
              private static final String TAG = "AsadVPN";
              private static final int VPN_REQ = 100, QR_REQ = 200;
              private static final String PREFS_UI = "asadvpn_ui";
              private static final String KEY_THEME = "theme_index";
              private static final String KEY_LANG = "language";
              private static final String KEY_CONNECTED_SVR = "connected_server_name";

              private static final int[][] THEMES = {
                  {0xFF1a1a2e, 0xFF00d4aa, 0xFF333355, 0xFFaaaaaa},
                  {0xFF0d1117, 0xFF58a6ff, 0xFF161b22, 0xFF8b949e},
                  {0xFF1a1025, 0xFFbb86fc, 0xFF332244, 0xFFb0a0c0},
              };
              private static final String[] THEME_NAMES = {"Dark Teal", "Ocean Blue", "Purple Night"};

              private Button connectBtn, importBtn, scanBtn, updateBtn, langToggle, themeToggle;
              private TextView statusTv, serverTv, daysTv, updateTv, titleText, subtitleText;
              private Spinner serverSpinner;
              private LinearLayout rootLayout;
              private ProfileManager pm;
              private ProfileCrypto.ProfileData profile;
              private ProfileCrypto.ServerInfo pendingServer;
              private VpnStateService svc;
              private String pendingUuid;
              private String connectedServerName;
              private int selectedSpinnerPos = 0;
              private boolean shownExpiryWarning = false;
              private SharedPreferences uiPrefs;

              private final ServiceConnection svcConn = new ServiceConnection() {
                  public void onServiceConnected(ComponentName n, IBinder b) {
                      svc = ((VpnStateService.LocalBinder) b).getService();
                      svc.registerListener(AsadMainActivity.this);
                      refreshUI();
                  }
                  public void onServiceDisconnected(ComponentName n) { svc = null; }
              };

              @Override
              protected void attachBaseContext(Context newBase) {
                  SharedPreferences p = newBase.getSharedPreferences(PREFS_UI, MODE_PRIVATE);
                  String lang = p.getString(KEY_LANG, "fa");
                  Locale locale = new Locale(lang);
                  Locale.setDefault(locale);
                  Configuration config = new Configuration(newBase.getResources().getConfiguration());
                  config.setLocale(locale);
                  super.attachBaseContext(newBase.createConfigurationContext(config));
              }

              @Override protected void onCreate(Bundle si) {
                  super.onCreate(si);
                  uiPrefs = getSharedPreferences(PREFS_UI, MODE_PRIVATE);
                  setContentView(R.layout.activity_asadvpn_main);

                  rootLayout = findViewById(R.id.root_layout);
                  connectBtn = findViewById(R.id.connect_button);
                  importBtn = findViewById(R.id.import_button);
                  scanBtn = findViewById(R.id.scan_button);
                  updateBtn = findViewById(R.id.update_button);
                  statusTv = findViewById(R.id.status_text);
                  serverTv = findViewById(R.id.server_text);
                  daysTv = findViewById(R.id.days_text);
                  updateTv = findViewById(R.id.update_text);
                  titleText = findViewById(R.id.title_text);
                  subtitleText = findViewById(R.id.subtitle_text);
                  serverSpinner = findViewById(R.id.server_spinner);
                  langToggle = findViewById(R.id.lang_toggle);
                  themeToggle = findViewById(R.id.theme_toggle);

                  pm = new ProfileManager(this);

                  if (si != null) {
                      shownExpiryWarning = si.getBoolean("shown_warning", false);
                      connectedServerName = si.getString("conn_svr");
                      selectedSpinnerPos = si.getInt("spinner_pos", 0);
                  } else {
                      connectedServerName = uiPrefs.getString(KEY_CONNECTED_SVR, null);
                  }

                  connectBtn.setOnClickListener(v -> onConnect());
                  importBtn.setOnClickListener(v -> showImport());
                  scanBtn.setOnClickListener(v -> launchQr());
                  updateBtn.setOnClickListener(v -> forceUpdate());
                  langToggle.setOnClickListener(v -> toggleLanguage());
                  themeToggle.setOnClickListener(v -> cycleTheme());

                  applyTheme();
                  bindService(new Intent(this, VpnStateService.class), svcConn, BIND_AUTO_CREATE);
              }

              @Override protected void onDestroy() {
                  super.onDestroy();
                  if (svc != null) svc.unregisterListener(this);
                  try { unbindService(svcConn); } catch (Exception ignored) {}
              }

              @Override protected void onResume() { super.onResume(); refreshUI(); }

              @Override protected void onSaveInstanceState(Bundle out) {
                  super.onSaveInstanceState(out);
                  out.putBoolean("shown_warning", shownExpiryWarning);
                  out.putString("conn_svr", connectedServerName);
                  out.putInt("spinner_pos", serverSpinner.getSelectedItemPosition());
              }

              @Override public void stateChanged() { runOnUiThread(this::refreshUI); }

              private void toggleLanguage() {
                  String cur = uiPrefs.getString(KEY_LANG, "fa");
                  String next = cur.equals("fa") ? "en" : "fa";
                  uiPrefs.edit().putString(KEY_LANG, next).apply();
                  recreate();
              }

              private void cycleTheme() {
                  int cur = uiPrefs.getInt(KEY_THEME, 0);
                  int next = (cur + 1) % THEMES.length;
                  uiPrefs.edit().putInt(KEY_THEME, next).apply();
                  applyTheme();
                  Toast.makeText(this, THEME_NAMES[next], Toast.LENGTH_SHORT).show();
              }

              private void applyTheme() {
                  int idx = uiPrefs.getInt(KEY_THEME, 0);
                  if (idx < 0 || idx >= THEMES.length) idx = 0;
                  int bg = THEMES[idx][0];
                  int accent = THEMES[idx][1];
                  rootLayout.setBackgroundColor(bg);
                  titleText.setTextColor(accent);
                  langToggle.setTextColor(accent);
                  themeToggle.setTextColor(accent);
                  updateBtn.setTextColor(accent);
              }

              private void populateSpinner() {
                  ArrayList<String> names = new ArrayList<>();
                  names.add(getString(R.string.auto_fastest));
                  if (profile != null && profile.servers != null) {
                      for (ProfileCrypto.ServerInfo s : profile.servers) {
                          names.add(s.name != null ? s.name : s.address);
                      }
                  }
                  ArrayAdapter<String> adapter = new ArrayAdapter<>(this,
                      android.R.layout.simple_spinner_item, names);
                  adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);
                  serverSpinner.setAdapter(adapter);
                  if (selectedSpinnerPos >= 0 && selectedSpinnerPos < names.size()) {
                      serverSpinner.setSelection(selectedSpinnerPos);
                  }
              }

              private void refreshUI() {
                  profile = pm.getActiveProfile();
                  long lu = pm.getLastUpdateTime();
                  updateTv.setText(lu > 0
                      ? String.format(getString(R.string.last_sync),
                          new SimpleDateFormat("MMM dd, HH:mm", Locale.getDefault()).format(new Date(lu)))
                      : "");

                  int curPos = serverSpinner.getSelectedItemPosition();
                  if (curPos >= 0) selectedSpinnerPos = curPos;
                  populateSpinner();

                  if (profile == null) {
                      statusTv.setText(getString(R.string.status_no_profile));
                      daysTv.setText(getString(R.string.import_needed));
                      serverTv.setText("");
                      connectBtn.setText(getString(R.string.btn_import));
                      connectBtn.setEnabled(true);
                      connectBtn.setBackgroundResource(R.drawable.circle_button_connect);
                      serverSpinner.setVisibility(View.GONE);
                      updateBtn.setVisibility(View.GONE);
                      return;
                  }

                  serverSpinner.setVisibility(View.VISIBLE);
                  updateBtn.setVisibility(
                      profile.updateUrl != null && !profile.updateUrl.isEmpty() ? View.VISIBLE : View.GONE);

                  if (profile.isExpired()) {
                      statusTv.setText(getString(R.string.status_expired));
                      daysTv.setText(String.format(getString(R.string.days_remaining), 0));
                      serverTv.setText("");
                      connectBtn.setText(getString(R.string.btn_expired));
                      connectBtn.setEnabled(false);
                      connectBtn.setBackgroundResource(R.drawable.circle_button_connect);
                      if (!shownExpiryWarning) { shownExpiryWarning = true; showExpired(); }
                      return;
                  }

                  int d = profile.remainingDays();
                  daysTv.setText(String.format(
                      getString(d != 1 ? R.string.days_remaining : R.string.day_remaining), d));

                  if (!shownExpiryWarning && d <= 3 && d > 0) {
                      shownExpiryWarning = true;
                      showExpiryWarning(d);
                  }

                  State st = svc != null ? svc.getState() : State.DISABLED;
                  switch (st) {
                      case CONNECTED:
                          statusTv.setText(getString(R.string.status_connected));
                          if (connectedServerName != null && !connectedServerName.isEmpty()) {
                              serverTv.setText(String.format(getString(R.string.connected_to), connectedServerName));
                          } else {
                              serverTv.setText(getString(R.string.secure_label));
                          }
                          connectBtn.setText(getString(R.string.btn_disconnect));
                          connectBtn.setBackgroundResource(R.drawable.circle_button_disconnect);
                          connectBtn.setEnabled(true);
                          break;
                      case CONNECTING:
                          statusTv.setText(getString(R.string.status_connecting));
                          serverTv.setText("");
                          connectBtn.setText(getString(R.string.btn_cancel));
                          connectBtn.setEnabled(true);
                          break;
                      case DISCONNECTING:
                          statusTv.setText(getString(R.string.status_disconnecting));
                          serverTv.setText("");
                          connectBtn.setText(getString(R.string.btn_wait));
                          connectBtn.setEnabled(false);
                          break;
                      default:
                          statusTv.setText(getString(R.string.status_disconnected));
                          serverTv.setText(getString(R.string.ready_label));
                          connectBtn.setText(getString(R.string.btn_connect));
                          
