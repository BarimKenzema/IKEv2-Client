              @Override protected void onDestroy() {
                  super.onDestroy();
                  mainHandler.removeCallbacks(fallbackWatchdog);
                  if (svc != null) svc.unregisterListener(this);
                  try { unbindService(svcConn); } catch (Exception ignored) {}
              }

              @Override protected void onResume() { super.onResume(); refreshUI(); }

              /* ══════════════════════════════════════════════════════════════
               *  THE CORE FIX: stateChanged() — reliable fallback detection
               * ══════════════════════════════════════════════════════════════ */
              @Override public void stateChanged() {
                  runOnUiThread(() -> {
                      if (svc == null) { refreshUI(); return; }

                      State st = svc.getState();
                      ErrorState err = svc.getErrorState();

                      Log.d(TAG, "stateChanged: state=" + st + " error=" + err
                          + " autoConnect=" + autoConnectInProgress
                          + " idx=" + currentServerIndex
                          + " gw=" + currentAttemptGateway);

                      if (autoConnectInProgress) {
                          if (st == State.CONNECTED) {
                              /* ── SUCCESS ── */
                              Log.i(TAG, "SUCCESS: Connected to " + connectedServerName);
                              autoConnectInProgress = false;
                              mainHandler.removeCallbacks(fallbackWatchdog);
                              refreshUI();
                              return;
                          }

                          if (st == State.DISABLED || st == State.DISCONNECTING) {
                              if (err != ErrorState.NO_ERROR) {
                                  /* ── FAILED — advance to next ── */
                                  Log.w(TAG, "FAILED on " + currentAttemptGateway
                                      + " error=" + err + ", advancing...");
                                  mainHandler.removeCallbacks(fallbackWatchdog);
                                  advanceToNextServer();
                                  return;
                              }
                              /* DISABLED with NO_ERROR can happen briefly during restart,
                               * the watchdog will catch it if charon never comes back */
                          }
                          /* CONNECTING state — just update UI, don't interfere */
                          refreshUI();
                          return;
                      }

                      /* Not in auto-connect mode — normal UI refresh */
                      refreshUI();
                  });
              }

              /* ══════════════════════════════════════════════════════════════
               *  Fallback chain: advance to next server
               * ══════════════════════════════════════════════════════════════ */
              private void advanceToNextServer() {
                  if (!autoConnectInProgress) return;

                  /* Disconnect current attempt cleanly */
                  if (svc != null) {
                      try { svc.disconnect(); } catch (Exception ignored) {}
                  }

                  int failedIdx = currentServerIndex;
                  String failedName = "server";
                  if (rankedServers != null && failedIdx < rankedServers.size()) {
                      ProfileCrypto.ServerInfo fs = rankedServers.get(failedIdx).server;
                      failedName = fs.name != null ? fs.name : fs.address;
                  }

                  int nextIdx = failedIdx + 1;

                  /* Skip remaining unreachable servers (latency == MAX_VALUE) */
                  while (rankedServers != null && nextIdx < rankedServers.size()
                      && rankedServers.get(nextIdx).latencyMs == Long.MAX_VALUE) {
                      Log.d(TAG, "Skipping unreachable: " + rankedServers.get(nextIdx).server.address);
                      nextIdx++;
                  }

                  if (rankedServers == null || nextIdx >= rankedServers.size()) {
                      /* All servers exhausted */
                      Log.w(TAG, "All servers exhausted after " + (failedIdx + 1) + " attempts");
                      autoConnectInProgress = false;
                      refreshUI();
                      Toast.makeText(this, getString(R.string.all_servers_failed), Toast.LENGTH_LONG).show();
                      return;
                  }

                  Toast.makeText(this,
                      String.format(getString(R.string.server_auth_failed), failedName),
                      Toast.LENGTH_SHORT).show();

                  final int idx = nextIdx;
                  /* Delay to let charon fully stop before restarting */
                  mainHandler.postDelayed(() -> tryServerAtIndex(idx), 2000);
              }

              /* ── Language ── */
              private void toggleLanguage() {
                  String current = uiPrefs.getString(KEY_LANG, "fa");
                  String next = current.equals("fa") ? "en" : "fa";
                  uiPrefs.edit().putString(KEY_LANG, next).apply();
                  recreate();
              }

              /* ── Theme ── */
              private void cycleTheme() {
                  int next = (uiPrefs.getInt(KEY_THEME, 0) + 1) % THEMES.length;
                  uiPrefs.edit().putInt(KEY_THEME, next).apply();
                  applyTheme();
                  Toast.makeText(this, THEME_NAMES[next], Toast.LENGTH_SHORT).show();
              }

              private void applyTheme() {
                  int idx = uiPrefs.getInt(KEY_THEME, 0);
                  if (idx < 0 || idx >= THEMES.length) idx = 0;
                  rootLayout.setBackgroundColor(THEMES[idx][0]);
                  langToggle.setTextColor(THEMES[idx][1]);
                  themeToggle.setTextColor(THEMES[idx][1]);
                  updateBtn.setTextColor(THEMES[idx][1]);
                  try {
                      langToggle.getBackground().setTint(THEMES[idx][3]);
                      themeToggle.getBackground().setTint(THEMES[idx][3]);
                  } catch (Exception ignored) {}
              }

              /* ── Spinner ── */
              private void populateSpinner() {
                  ArrayList<String> names = new ArrayList<>();
                  names.add(getString(R.string.auto_fastest));
                  if (profile != null && profile.servers != null) {
                      for (ProfileCrypto.ServerInfo s : profile.servers)
                          names.add(s.name != null ? s.name : s.address);
                  }
                  ArrayAdapter<String> adapter = new ArrayAdapter<>(this,
                      android.R.layout.simple_spinner_item, names);
                  adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);
                  serverSpinner.setAdapter(adapter);
                  if (savedSpinnerPos >= 0 && savedSpinnerPos < names.size())
                      serverSpinner.setSelection(savedSpinnerPos);
              }

              /* ── Refresh UI ── */
              private void refreshUI() {
                  profile = pm.getActiveProfile();
                  int curPos = serverSpinner.getSelectedItemPosition();
                  if (curPos >= 0) savedSpinnerPos = curPos;

                  long lu = pm.getLastUpdateTime();
                  updateTv.setText(lu > 0
                      ? String.format(getString(R.string.last_sync),
                          new SimpleDateFormat("MMM dd, HH:mm", Locale.getDefault()).format(new Date(lu)))
                      : "");

                  populateSpinner();

                  if (profile == null) {
                      statusTv.setText(getString(R.string.status_no_profile));
                      daysTv.setText(getString(R.string.import_needed));
                      serverTv.setText("");
                      connectBtn.setText(getString(R.string.btn_import));
                      connectBtn.setEnabled(true);
                      connectBtn.setBackgroundResource(R.drawable.circle_button_connect);
                      connectBtn.setTextColor(Color.WHITE);
                      serverSpinner.setVisibility(View.GONE);
                      updateBtn.setVisibility(View.GONE);
                      return;
                  }

                  serverSpinner.setVisibility(View.VISIBLE);
                  updateBtn.setVisibility(
                      profile.updateUrl != null && !profile.updateUrl.isEmpty() ? View.VISIBLE : View.GONE);

                  if (profile.isExpired()) {
                      statusTv.setText(getString(R.string.status_expired));
                      statusTv.setTextColor(0xFFff4444);
                      daysTv.setText(String.format(getString(R.string.days_remaining), 0));
                      daysTv.setTextColor(0xFFff4444);
                      serverTv.setText("");
                      connectBtn.setText(getString(R.string.btn_expired));
                      connectBtn.setEnabled(false);
                      connectBtn.setBackgroundResource(R.drawable.circle_button_expired);
                      connectBtn.setTextColor(0xFF999999);
                      return;
                  }

                  statusTv.setTextColor(Color.WHITE);
                  int d = profile.remainingDays();
                  daysTv.setText(String.format(
                      getString(d != 1 ? R.string.days_remaining : R.string.day_remaining), d));
                  daysTv.setTextColor(d <= 3 ? 0xFFff6600 : 0xFFffcc00);

                  State st = svc != null ? svc.getState() : State.DISABLED;
                  switch (st) {
                      case CONNECTED:
                          statusTv.setText(getString(R.string.status_connected));
                          statusTv.setTextColor(0xFF00dd88);
                          serverTv.setText(connectedServerName != null
                              ? String.format(getString(R.string.connected_to), connectedServerName)
                              : getString(R.string.secure_label));
                          connectBtn.setText(getString(R.string.btn_disconnect));
                          connectBtn.setBackgroundResource(R.drawable.circle_button_disconnect);
                          connectBtn.setTextColor(Color.WHITE);
                          connectBtn.setEnabled(true);
                          break;
                      case CONNECTING:
                          statusTv.setText(getString(R.string.status_connecting));
                          if (autoConnectInProgress && rankedServers != null
                              && currentServerIndex < rankedServers.size()) {
                              ProfileCrypto.ServerInfo cs = rankedServers.get(currentServerIndex).server;
                              String n = cs.name != null ? cs.name : cs.address;
                              serverTv.setText(String.format(getString(R.string.trying_server),
                                  n, currentServerIndex + 1, rankedServers.size()));
                          }
                          connectBtn.setText(getString(R.string.btn_cancel));
                          connectBtn.setBackgroundResource(R.drawable.circle_button_connecting);
                          connectBtn.setTextColor(Color.WHITE);
                          connectBtn.setEnabled(true);
                          break;
                      case DISCONNECTING:
                          statusTv.setText(getString(R.string.status_disconnecting));
                          serverTv.setText("");
                          connectBtn.setText(getString(R.string.btn_wait));
                          connectBtn.setBackgroundResource(R.drawable.circle_button_connecting);
                          connectBtn.setTextColor(Color.WHITE);
                          connectBtn.setEnabled(false);
                          break;
                      default: /* DISABLED */
                          statusTv.setText(getString(R.string.status_disconnected));
                          serverTv.setText(getString(R.string.ready_label));
                          connectBtn.setText(getString(R.string.btn_connect));
                          connectBtn.setBackgroundResource(R.drawable.circle_button_connect);
                          connectBtn.setTextColor(Color.WHITE);
                          connectBtn.setEnabled(true);
                          if (!autoConnectInProgress) connectedServerName = null;
                          break;
                  }
              }

              /* ── Connect ── */
              private void onConnect() {
                  if (profile == null) { showImport(); return; }
                  if (profile.isExpired()) { showExpired(); return; }
                  State st = svc != null ? svc.getState() : State.DISABLED;
                  if (st == State.CONNECTED || st == State.CONNECTING) {
                      /* User pressed cancel/disconnect */
                      autoConnectInProgress = false;
                      mainHandler.removeCallbacks(fallbackWatchdog);
                      if (svc != null) svc.disconnect();
                      connectedServerName = null;
                      return;
                  }

                  int sel = serverSpinner.getSelectedItemPosition();
                  savedSpinnerPos = sel;
                  statusTv.setText(getString(R.string.status_connecting));
                  connectBtn.setEnabled(false);
                  connectBtn.setBackgroundResource(R.drawable.circle_button_connecting);

                  if (sel <= 0) {
                      /* Auto mode with fallback chain */
                      serverTv.setText(getString(R.string.selecting_server));
                      autoConnectInProgress = true;
                      currentServerIndex = 0;

                      new Thread(() -> {
                          rankedServers = FastServerSelector.rankServers(profile.servers);
                          /* Remove unreachable servers from list entirely */
                          List<FastServerSelector.RankedServer> reachable = new ArrayList<>();
                          for (FastServerSelector.RankedServer rs : rankedServers) {
                              if (rs.latencyMs < Long.MAX_VALUE) reachable.add(rs);
                          }
                          rankedServers = reachable;

                          if (rankedServers.isEmpty()) {
                              runOnUiThread(() -> {
                                  autoConnectInProgress = false;
                                  refreshUI();
                                  Toast.makeText(this, getString(R.string.no_servers),
                                      Toast.LENGTH_SHORT).show();
                              });
                              return;
                          }
                          runOnUiThread(() -> tryServerAtIndex(0));
                      }).start();
                  } else {
                      /* Manual selection — single attempt, no fallback */
                      autoConnectInProgress = false;
                      startVpn(profile.servers[sel - 1]);
                  }
              }

              private void tryServerAtIndex(int index) {
                  if (!autoConnectInProgress) return;
                  if (rankedServers == null || index >= rankedServers.size()) {
                      autoConnectInProgress = false;
                      refreshUI();
                      Toast.makeText(this, getString(R.string.all_servers_failed),
                          Toast.LENGTH_LONG).show();
                      return;
                  }

                  currentServerIndex = index;
                  FastServerSelector.RankedServer rs = rankedServers.get(index);
                  String name = rs.server.name != null ? rs.server.name : rs.server.address;
                  currentAttemptGateway = rs.server.address;

                  Log.i(TAG, "Trying server " + (index + 1) + "/" + rankedServers.size()
                      + ": " + name + " (" + rs.latencyMs + "ms)"
                      + " gateway=" + currentAttemptGateway);

                  statusTv.setText(getString(R.string.status_connecting));
                  serverTv.setText(String.format(getString(R.string.trying_server),
                      name, index + 1, rankedServers.size()));
                  connectBtn.setText(getString(R.string.btn_cancel));
                  connectBtn.setEnabled(true);
                  connectBtn.setBackgroundResource(R.drawable.circle_button_connecting);

                  /* Start the watchdog timer — if no callback in FALLBACK_TIMEOUT_MS, force advance */
                  mainHandler.removeCallbacks(fallbackWatchdog);
                  mainHandler.postDelayed(fallbackWatchdog, FALLBACK_TIMEOUT_MS);

                  startVpn(rs.server);
              }

              private int findServerIndex(ProfileCrypto.ServerInfo server) {
                  if (profile == null || profile.servers == null) return -1;
                  for (int i = 0; i < profile.servers.length; i++)
                      if (profile.servers[i].address.equals(server.address)) return i;
                  return -1;
              }

              private void startVpn(ProfileCrypto.ServerInfo server) {
                  try {
                      String certAlias = null;
                      if (server.hasCaCert()) {
                          certAlias = CertificateImporter.importCaCertificate(server.caCertPem);
                          Log.i(TAG, "Cert import: alias=" + certAlias);
                          if (certAlias == null) {
                              Log.w(TAG, "Cert import failed for " + server.address);
                              if (autoConnectInProgress) { advanceToNextServer(); return; }
                              Toast.makeText(this, getString(R.string.cert_failed),
                                  Toast.LENGTH_LONG).show();
                              refreshUI(); return;
                          }
                      }

                      VpnProfileSqlDataSource ds = new VpnProfileSqlDataSource();
                      ds.open();
                      try {
                          List<VpnProfile> all = ds.getAllVpnProfiles();
                          for (VpnProfile p : all)
                              if (p.getName() != null && p.getName().startsWith("AsadVPN"))
                                  ds.deleteVpnProfile(p);
                      } catch (Exception e) { Log.w(TAG, "Clean: " + e.getMessage()); }

                      VpnProfile vp = new VpnProfile();
                      vp.setName("AsadVPN - " + server.name);
                      vp.setGateway(server.address);
                      vp.setUsername(server.username);
                      vp.setPassword(server.password);
                      vp.setVpnType(VpnType.IKEV2_EAP);
                      if (certAlias != null) vp.setCertificateAlias(certAlias);
                      if (server.remoteId != null && !server.remoteId.isEmpty())
                          vp.setRemoteId(server.remoteId);
                      if (profile.ikeProposal != null && !profile.ikeProposal.isEmpty())
                          vp.setIkeProposal(profile.ikeProposal);
                      if (profile.espProposal != null && !profile.espProposal.isEmpty())
                          vp.setEspProposal(profile.espProposal);
                      if (profile.mtu != null && profile.mtu > 0)
                          vp.setMTU(profile.mtu);
                      if (profile.splitTunneling != null)
                          vp.setSplitTunneling(profile.splitTunneling);

                      VpnProfile saved = ds.insertProfile(vp);
                      ds.close();

                      if (saved == null) {
                          Log.e(TAG, "Profile save failed for " + server.address);
                          if (autoConnectInProgress) { advanceToNextServer(); return; }
                          Toast.makeText(this, getString(R.string.save_failed),
                              Toast.LENGTH_LONG).show();
                          refreshUI(); return;
                      }

                      Log.i(TAG, "Profile saved: uuid=" + saved.getUUID()
                          + " gw=" + saved.getGateway()
                          + " cert=" + saved.getCertificateAlias()
                          + " remoteId=" + saved.getRemoteId());

                      pendingUuid = saved.getUUID().toString();
                      pendingServer = server;
                      connectedServerName = server.name != null ? server.name : server.address;

                      Intent intent = VpnService.prepare(this);
                      if (intent != null) startActivityForResult(intent, VPN_REQ);
                      else launchVpn();
                  } catch (Exception e) {
                      Log.e(TAG, "VPN start error", e);
                      if (autoConnectInProgress) { advanceToNextServer(); return; }
                      Toast.makeText(this, String.format(getString(R.string.vpn_failed),
                          e.getMessage()), Toast.LENGTH_LONG).show();
                      refreshUI();
                  }
              }

              private void launchVpn() {
                  if (pendingUuid == null || svc == null) {
                      if (autoConnectInProgress) { advanceToNextServer(); return; }
                      refreshUI(); return;
                  }
                  Bundle b = new Bundle();
                  b.putString(VpnProfileDataSource.KEY_UUID, pendingUuid);
                  b.putString(VpnProfileDataSource.KEY_PASSWORD, pendingServer.password);
                  svc.connect(b, true);
              }

              @Override protected void onActivityResult(int req, int res, Intent data) {
                  super.onActivityResult(req, res, data);
                  if (req == VPN_REQ) {
                      if (res == RESULT_OK) launchVpn();
                      else {
                          autoConnectInProgress = false;
                          mainHandler.removeCallbacks(fallbackWatchdog);
                          refreshUI();
                      }
                  } else if (req == QR_REQ && res == RESULT_OK && data != null) {
                      String s = data.getStringExtra("SCAN_RESULT");
                      if (s != null && !s.isEmpty()) doImport(s);
                  }
              }

              /* ── Update ── */
              private void forceUpdate() {
                  if (profile == null) { Toast.makeText(this, getString(R.string.import_first), Toast.LENGTH_SHORT).show(); return; }
                  if (profile.updateUrl == null || profile.updateUrl.isEmpty()) { Toast.makeText(this, getString(R.string.no_update_url), Toast.LENGTH_SHORT).show(); return; }
                  Toast.makeText(this, getString(R.string.updating), Toast.LENGTH_SHORT).show();
                  pm.forceUpdate(new ProfileManager.UpdateCallback() {
                      public void onUpdated(ProfileCrypto.ProfileData d) {
                          runOnUiThread(() -> { profile = d; refreshUI();
                              Toast.makeText(AsadMainActivity.this, getString(R.string.servers_updated), Toast.LENGTH_SHORT).show(); }); }
                      public void onError(Exception e) {
                          runOnUiThread(() -> Toast.makeText(AsadMainActivity.this,
                              String.format(getString(R.string.update_failed), e.getMessage()), Toast.LENGTH_LONG).show()); }
                  });
              }

              /* ── Import ── */
              private void showImport() {
                  View v = getLayoutInflater().inflate(R.layout.dialog_import_profile, null);
                  EditText input = v.findViewById(R.id.profile_input);
                  new AlertDialog.Builder(this, android.R.style.Theme_DeviceDefault_Dialog_Alert)
                      .setTitle(getString(R.string.import_title))
                      .setView(v)
                      .setPositiveButton(getString(R.string.import_btn_ok), (d, w) -> {
                          String t = input.getText().toString().trim();
                          if (!t.isEmpty()) doImport(t); })
                      .setNegativeButton(getString(R.string.import_btn_cancel), null)
                      .show();
              }

              private void doImport(String enc) {
                  try {
                      profile = pm.importProfile(enc);
                      if (profile.isExpired()) { showExpired(); return; }
                      Toast.makeText(this,
                          String.format(getString(R.string.imported_days), profile.remainingDays()),
                          Toast.LENGTH_LONG).show();
                      refreshUI();
                      if (profile.remainingDays() <= 3) showRenewalWarning(profile.remainingDays());
                  } catch (Exception e) {
                      Log.e(TAG, "Import fail", e);
                      Toast.makeText(this, String.format(getString(R.string.invalid_profile),
                          e.getMessage()), Toast.LENGTH_LONG).show();
                  }
              }

              /* ── QR ── */
              private void launchQr() {
                  try { startActivityForResult(new Intent(this, QrScannerActivity.class), QR_REQ); }
                  catch (Exception e) { Toast.makeText(this, getString(R.string.qr_unavailable), Toast.LENGTH_LONG).show(); }
              }

              /* ── Expired dialog ── */
              private void showExpired() {
                  new AlertDialog.Builder(this, android.R.style.Theme_DeviceDefault_Dialog_Alert)
                      .setTitle(getString(R.string.expired_title))
                      .setMessage(getString(R.string.expired_msg))
                      .setPositiveButton(getString(R.string.expired_support), (d, w) ->
                          startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(SUPPORT_URL))))
                      .setNegativeButton(getString(R.string.expired_close), null)
                      .setCancelable(false)
                      .show();
              }

              /* ── Renewal warning ── */
              private void showRenewalWarning(int days) {
                  new AlertDialog.Builder(this, android.R.style.Theme_DeviceDefault_Dialog_Alert)
                      .setTitle(getString(R.string.renew_title))
                      .setMessage(String.format(getString(R.string.renew_msg), days))
                      .setPositiveButton(getString(R.string.renew_btn), (d, w) ->
                          startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(SUPPORT_URL))))
                      .setNegativeButton(getString(R.string.renew_dismiss), null)
                      .setCancelable(true)
                      .show();
              }
          }
          JAVAEOF

      - name: Patch AndroidManifest
        run: |
          cd ss-full/src/frontends/android
          python3 << 'PYEOF'
          with open("app/src/main/AndroidManifest.xml", "r") as f:
              content = f.read()
          content = content.replace(
              '<category android:name="android.intent.category.LAUNCHER" />',
              '<!-- launcher moved -->')
          if 'android.permission.CAMERA' not in content:
              content = content.replace('<application',
                  '<uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n\n    <application')
          if 'android.permission.INTERNET' not in content:
              content = content.replace('<application',
                  '<uses-permission android:name="android.permission.INTERNET" />\n    <application')
          content = content.replace('</application>', '''
                  <activity android:name=".ui.AsadMainActivity"
                      android:label="AsadVPN" android:exported="true"
                      android:theme="@style/ApplicationTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity android:name=".ui.QrScannerActivity"
                      android:label="Scan QR" android:exported="false"
                      android:theme="@style/ApplicationTheme"
                      android:screenOrientation="portrait" />
                  <meta-data android:name="com.google.android.gms.vision.DEPENDENCIES"
                      android:value="barcode" />
              </application>''')
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(content)
          PYEOF

      - name: Add play-services-vision dependency
        run: |
          cd ss-full/src/frontends/android
          python3 << 'PYEOF'
          with open("app/build.gradle", "r") as f:
              content = f.read()
          if 'play-services-vision' not in content:
              content = content.replace('dependencies {',
                  "dependencies {\n    implementation 'com.google.android.gms:play-services-vision:20.1.3'")
          with open("app/build.gradle", "w") as f:
              f.write(content)
          PYEOF

      - name: Pre-build validation
        run: |
          cd ss-full/src/frontends/android
          echo "=== applicationId ==="
          grep "applicationId" app/build.gradle
          echo "=== LAUNCHER ==="
          grep -c "android.intent.category.LAUNCHER" app/src/main/AndroidManifest.xml
          echo "=== play-services ==="
          grep "play-services-vision" app/build.gradle
          echo "=== VpnProfileSqlDataSource no-arg ==="
          grep -n "new VpnProfileSqlDataSource" app/src/main/java/org/strongswan/android/ui/AsadMainActivity.java
          echo "=== connect(Bundle,boolean) ==="
          grep -n "svc.connect" app/src/main/java/org/strongswan/android/ui/AsadMainActivity.java
          echo "=== Dialog theme ==="
          grep -n "Theme_DeviceDefault_Dialog" app/src/main/java/org/strongswan/android/ui/AsadMainActivity.java
          echo "=== Button drawables ==="
          ls -la app/src/main/res/drawable/circle_button_*.xml
          echo "=== All custom files ==="
          for f in \
            app/src/main/java/org/strongswan/android/logic/ProfileCrypto.java \
            app/src/main/java/org/strongswan/android/logic/CertificateImporter.java \
            app/src/main/java/org/strongswan/android/logic/ProfileManager.java \
            app/src/main/java/org/strongswan/android/logic/FastServerSelector.java \
            app/src/main/java/org/strongswan/android/ui/AsadMainActivity.java \
            app/src/main/java/org/strongswan/android/ui/QrScannerActivity.java \
            app/src/main/res/values/asad_strings.xml \
            app/src/main/res/values-fa/strings.xml \
            app/src/main/res/drawable/circle_button_expired.xml \
            app/src/main/res/drawable/circle_button_connecting.xml; do
            if [ -f "$f" ]; then echo "OK: $f"; else echo "MISSING: $f"; exit 1; fi
          done

      - name: Build APK
        run: |
          cd ss-full/src/frontends/android
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          sed -i "s|arguments '-j'|arguments 'APP_ALLOW_MISSING_DEPS=true', '-j'|" app/build.gradle
          set +e
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee "${GITHUB_WORKSPACE}/build.log"
          RESULT=${PIPESTATUS[0]}
          set -e
          if [ ${RESULT} -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "--- Java errors ---"
            grep -E "error:" "${GITHUB_WORKSPACE}/build.log" | grep -v "Exception\|ProcessException\|CXX1429\|error when building\|IssueReporter\|TaskExecution\|EventFiring\|DefaultBuild" | head -30
            echo "--- Symbol errors ---"
            grep -B2 -A2 "cannot find symbol\|incompatible types\|is abstract\|does not exist\|constructor.*cannot" "${GITHUB_WORKSPACE}/build.log" | head -60
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: asadvpn-debug-apk
          path: ss-full/src/frontends/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
