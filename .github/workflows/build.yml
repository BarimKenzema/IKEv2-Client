          package org.strongswan.android.logic;

          import android.util.Log;
          import java.net.InetSocketAddress;
          import java.net.Socket;
          import java.util.ArrayList;
          import java.util.Collections;
          import java.util.Comparator;
          import java.util.List;
          import java.util.concurrent.*;

          public class FastServerSelector {
              private static final String TAG = "AsadVPN.FastSelect";
              private static final int[] PROBE_PORTS = {4500, 500, 443, 80};
              private static final int TIMEOUT_MS = 3000;

              public static class RankedServer {
                  public ProfileCrypto.ServerInfo server;
                  public long latencyMs;
                  public RankedServer(ProfileCrypto.ServerInfo s, long ms) { server = s; latencyMs = ms; }
              }

              /** Returns ALL servers sorted by latency (fastest first) */
              public static List<RankedServer> rankServers(ProfileCrypto.ServerInfo[] servers) {
                  List<RankedServer> result = new ArrayList<>();
                  if (servers == null || servers.length == 0) return result;
                  if (servers.length == 1) {
                      result.add(new RankedServer(servers[0], 0));
                      return result;
                  }

                  int count = Math.min(servers.length, 10);
                  ExecutorService exec = Executors.newFixedThreadPool(count);
                  List<Future<long[]>> futures = new ArrayList<>();

                  for (int i = 0; i < count; i++) {
                      final int idx = i;
                      futures.add(exec.submit(() -> {
                          long bestTime = Long.MAX_VALUE;
                          for (int port : PROBE_PORTS) {
                              try {
                                  long start = System.currentTimeMillis();
                                  Socket sock = new Socket();
                                  sock.connect(new InetSocketAddress(servers[idx].address, port), TIMEOUT_MS);
                                  long elapsed = System.currentTimeMillis() - start;
                                  sock.close();
                                  Log.d(TAG, servers[idx].address + ":" + port + " = " + elapsed + "ms");
                                  if (elapsed < bestTime) bestTime = elapsed;
                                  break;
                              } catch (Exception e) {
                                  Log.d(TAG, servers[idx].address + ":" + port + " fail");
                              }
                          }
                          if (bestTime == Long.MAX_VALUE) {
                              try {
                                  long start = System.currentTimeMillis();
                                  java.net.InetAddress.getByName(servers[idx].address);
                                  bestTime = System.currentTimeMillis() - start + 500;
                              } catch (Exception e) { /* keep MAX_VALUE */ }
                          }
                          return new long[]{idx, bestTime};
                      }));
                  }

                  try {
                      exec.shutdown();
                      exec.awaitTermination(6, TimeUnit.SECONDS);
                      for (Future<long[]> f : futures) {
                          try {
                              if (f.isDone()) {
                                  long[] r = f.get();
                                  int idx = (int)r[0];
                                  Log.i(TAG, servers[idx].address + " latency=" + r[1] + "ms");
                                  result.add(new RankedServer(servers[idx], r[1]));
                              }
                          } catch (Exception ignored) {}
                      }
                  } catch (Exception e) { Log.w(TAG, "Executor error", e); }

                  /* Add any servers beyond count limit */
                  for (int i = count; i < servers.length; i++) {
                      result.add(new RankedServer(servers[i], Long.MAX_VALUE));
                  }

                  Collections.sort(result, (a, b) -> Long.compare(a.latencyMs, b.latencyMs));

                  if (!result.isEmpty()) {
                      Log.i(TAG, "Ranking: 1st=" + result.get(0).server.address
                          + " (" + result.get(0).latencyMs + "ms), total=" + result.size());
                  }
                  return result;
              }

              /** Legacy method — returns single fastest */
              public static ProfileCrypto.ServerInfo findFastest(ProfileCrypto.ServerInfo[] servers) {
                  List<RankedServer> ranked = rankServers(servers);
                  return ranked.isEmpty() ? null : ranked.get(0).server;
              }
          }
