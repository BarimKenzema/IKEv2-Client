                  connectBtn.setOnClickListener(v -> onConnect());
                  importBtn.setOnClickListener(v -> showImport());
                  scanBtn.setOnClickListener(v -> launchQr());
                  updateBtn.setOnClickListener(v -> forceUpdate());
