          package org.strongswan.android.ui;

          import android.Manifest;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.util.Log;
          import android.util.SparseArray;
          import android.view.SurfaceHolder;
          import android.view.SurfaceView;
          import android.widget.Toast;
          import com.google.android.gms.vision.CameraSource;
          import com.google.android.gms.vision.Detector;
          import com.google.android.gms.vision.barcode.Barcode;
          import com.google.android.gms.vision.barcode.BarcodeDetector;
          import org.strongswan.android.R;
          import java.io.IOException;

          public class QrScannerActivity extends Activity {
              private static final int CAMERA_PERM = 1001;
              private CameraSource cameraSource;
              private SurfaceView surfaceView;
              private boolean detected = false;

              @Override protected void onCreate(Bundle si) {
                  super.onCreate(si);
                  setContentView(R.layout.activity_qr_scanner);
                  surfaceView = findViewById(R.id.camera_preview);
                  findViewById(R.id.cancel_scan).setOnClickListener(v -> { setResult(RESULT_CANCELED); finish(); });
                  if (Build.VERSION.SDK_INT >= 23 && checkSelfPermission(Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED)
                      requestPermissions(new String[]{Manifest.permission.CAMERA}, CAMERA_PERM);
                  else setupScanner();
              }

              @Override public void onRequestPermissionsResult(int req, String[] p, int[] r) {
                  if (req == CAMERA_PERM) {
                      if (r.length > 0 && r[0] == PackageManager.PERMISSION_GRANTED) setupScanner();
                      else { Toast.makeText(this, getString(R.string.camera_required), Toast.LENGTH_LONG).show(); setResult(RESULT_CANCELED); finish(); }
                  }
              }

              private void setupScanner() {
                  BarcodeDetector det = new BarcodeDetector.Builder(this).setBarcodeFormats(Barcode.QR_CODE).build();
                  if (!det.isOperational()) { Toast.makeText(this, getString(R.string.qr_not_available), Toast.LENGTH_LONG).show(); setResult(RESULT_CANCELED); finish(); return; }
                  cameraSource = new CameraSource.Builder(this, det).setAutoFocusEnabled(true).setRequestedPreviewSize(1024, 768).build();
                  surfaceView.getHolder().addCallback(new SurfaceHolder.Callback() {
                      public void surfaceCreated(SurfaceHolder h) { startCam(); }
                      public void surfaceChanged(SurfaceHolder h, int f, int w, int ht) {}
                      public void surfaceDestroyed(SurfaceHolder h) { if (cameraSource != null) cameraSource.stop(); }
                  });
                  det.setProcessor(new Detector.Processor<Barcode>() {
                      public void release() {}
                      public void receiveDetections(Detector.Detections<Barcode> d) {
                          SparseArray<Barcode> items = d.getDetectedItems();
                          if (items.size() > 0 && !detected) { detected = true; Intent r = new Intent(); r.putExtra("SCAN_RESULT", items.valueAt(0).rawValue); setResult(RESULT_OK, r); finish(); }
                      }
                  });
              }

              @SuppressWarnings("MissingPermission")
              private void startCam() { try { if (cameraSource != null) cameraSource.start(surfaceView.getHolder()); } catch (IOException|SecurityException e) { Log.e("QR", "err", e); } }

              @Override protected void onDestroy() { super.onDestroy(); if (cameraSource != null) { cameraSource.stop(); cameraSource.release(); } }
          }
          JAVA_EOF

