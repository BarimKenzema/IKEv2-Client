          package org.strongswan.android.logic;

          import android.util.Log;
          import java.net.ConnectException;
          import java.net.InetSocketAddress;
          import java.net.Socket;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.concurrent.Executors;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Future;
          import java.util.concurrent.TimeUnit;

          public class FastServerSelector {
              private static final String TAG = "AsadVPN.ServerSelect";
              private static final int[] PROBE_PORTS = {443, 4500, 500, 80};
              private static final int TIMEOUT_MS = 3000;

              public static ProfileCrypto.ServerInfo findFastest(ProfileCrypto.ServerInfo[] servers) {
                  if (servers == null || servers.length == 0) return null;
                  if (servers.length == 1) return servers[0];

                  int count = Math.min(servers.length, 10);
                  ExecutorService exec = Executors.newFixedThreadPool(count);
                  List<Future<long[]>> futures = new ArrayList<>();

                  for (int i = 0; i < count; i++) {
                      final int idx = i;
                      futures.add(exec.submit(() -> {
                          long best = Long.MAX_VALUE;
                          for (int port : PROBE_PORTS) {
                              long start = System.currentTimeMillis();
                              try {
                                  Socket sock = new Socket();
                                  sock.connect(new InetSocketAddress(servers[idx].address, port), TIMEOUT_MS);
                                  long elapsed = System.currentTimeMillis() - start;
                                  sock.close();
                                  Log.d(TAG, servers[idx].address + ":" + port + " open " + elapsed + "ms");
                                  best = Math.min(best, elapsed);
                                  break;
                              } catch (ConnectException e) {
                                  long elapsed = System.currentTimeMillis() - start;
                                  Log.d(TAG, servers[idx].address + ":" + port + " refused " + elapsed + "ms (reachable)");
                                  best = Math.min(best, elapsed);
                                  break;
                              } catch (Exception e) {
                                  Log.d(TAG, servers[idx].address + ":" + port + " fail: " + e.getMessage());
                              }
                          }
                          if (best == Long.MAX_VALUE) {
                              long start = System.currentTimeMillis();
                              try {
                                  java.net.InetAddress.getByName(servers[idx].address);
                                  best = System.currentTimeMillis() - start + 500;
                                  Log.d(TAG, servers[idx].address + " dns=" + best + "ms");
                              } catch (Exception e) {
                                  Log.d(TAG, servers[idx].address + " dns fail");
                              }
                          }
                          return new long[]{idx, best};
                      }));
                  }

                  int bestIdx = 0;
                  long bestMs = Long.MAX_VALUE;
                  try {
                      exec.shutdown();
                      exec.awaitTermination(5, TimeUnit.SECONDS);
                      for (Future<long[]> f : futures) {
                          if (f.isDone()) {
                              try {
                                  long[] r = f.get();
                                  Log.i(TAG, servers[(int)r[0]].address + " -> " + r[1] + "ms");
                                  if (r[1] < bestMs) { bestMs = r[1]; bestIdx = (int)r[0]; }
                              } catch (Exception ignored) {}
                          }
                      }
                  } catch (Exception e) { Log.w(TAG, "Select error", e); }

                  if (bestMs == Long.MAX_VALUE) {
                      bestIdx = (int)(Math.random() * servers.length);
                      Log.w(TAG, "All probes failed, random: " + servers[bestIdx].address);
                  } else {
                      Log.i(TAG, "Fastest: " + servers[bestIdx].address + " (" + bestMs + "ms)");
                  }
                  return servers[bestIdx];
              }
          }
