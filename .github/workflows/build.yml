          ICON_EOF
          cat > "${RES_DIR}/drawable/ic_launcher_background.xml" << 'BG_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
